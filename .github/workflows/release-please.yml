name: Release Please

on:
  push:
    branches:
      - 1.x-dev

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          target-branch: 1.x-dev
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
